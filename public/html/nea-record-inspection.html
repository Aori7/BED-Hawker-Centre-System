<main class="nea-page"><section class="nea-header"><div><h1>Record Inspection Result</h1><p>Enter inspection findings for the selected stall.</p></div></section>
<section class="nea-card"><form id="inspection-form" class="nea-form"><div class="form-row"><label>Food Stall<select required><option value="">Select stall</option><option>Ah Seng Chicken Rice</option><option>Laksa King</option><option>Kopi More</option></select></label><label>Inspection Date<input type="date" required></label></div><div class="form-row"><label>Inspection Score<input type="number" min="0" max="100" placeholder="0 - 100" required></label><label>Recommended Grade<select required><option value="">Select grade</option><option>A</option><option>B</option><option>C</option><option>D</option></select></label></div><label>Compliance Status<select required><option>Compliant</option><option>Non-Compliant</option><option>Follow-up Required</option></select></label><label>Inspection Remarks<textarea placeholder="Enter findings, observations and corrective actions" required></textarea></label><div class="actions"><button type="submit">Save Inspection</button><button type="reset" class="secondary-btn">Clear Form</button></div></form></section>
</main><script src="../js/nea.js"></script></body></html>
